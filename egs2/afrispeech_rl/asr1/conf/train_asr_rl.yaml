# conf/train_asr_rl.yaml
# Stage 2: Reward-augmented fine-tuning (RL stage), continuing from SFT checkpoint.
#
# Aligned to the ACTUAL NeMo run recorded in docs/results_17Apr2026.md:
#   RL objective : reweight_ctc  (per-utterance CTC weighted by 1-reward_i)
#   Reward mode  : wwer          (domain-weighted WER, 37-token clinical vocabulary)
#   rl_weight    : 0.02          (NeMo actual REWARD_WEIGHT=0.02)
#   Epochs       : 2             (NeMo actual RL_EPOCHS=2)
#   Precision    : FP32          (NeMo FORCE_FP32=true; use_amp=false)
#   Grad clip    : 1.0           (NeMo actual)
#   Optimizer    : AdamW, lr=1e-5
#   Step interval: 4             (NeMo REWARD_STEP_INTERVAL=4)
#   Seed         : 42            (NeMo seed=42)

# --- Architecture (same as SFT) ---
encoder: conformer
encoder_conf:
    output_size: 256
    attention_heads: 4
    linear_units: 2048
    num_blocks: 12
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    attention_dropout_rate: 0.1
    input_layer: conv2d
    normalize_before: true
    macaron_style: true
    pos_enc_layer_type: rel_pos
    selfattention_layer_type: rel_selfattn
    activation_type: swish
    use_cnn_module: true
    cnn_module_kernel: 31

decoder: transformer
decoder_conf:
    attention_heads: 4
    linear_units: 2048
    num_blocks: 6
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    self_attention_dropout_rate: 0.1
    src_attention_dropout_rate: 0.1

# --- Model config ---
model_conf:
    ctc_weight: 0.3
    lsm_weight: 0.1
    length_normalized_loss: false

# --- SpecAugment ---
specaug: specaug
specaug_conf:
    apply_time_warp: true
    time_warp_window: 5
    apply_time_mask: true
    time_mask_width_ratio_range:
    - 0.0
    - 0.05
    num_time_mask: 5
    apply_freq_mask: true
    freq_mask_width_range:
    - 0
    - 30
    num_freq_mask: 2

# --- Optimizer (AdamW, lr=1e-5 — NeMo LEARNING_RATE_RL=1e-5) ---
optim: adamw
optim_conf:
    lr: 1.0e-5                # 10x smaller than SFT (NeMo pattern)
    betas:
    - 0.9
    - 0.98
    weight_decay: 1.0e-3
    eps: 1.0e-8

# --- Scheduler ---
scheduler: warmuplr
scheduler_conf:
    warmup_steps: 500         # shorter warmup for RL fine-tuning

# --- Training ---
max_epoch: 2                  # NeMo actual RL_EPOCHS=2
batch_type: numel
batch_bins: 4000000
accum_grad: 2
grad_clip: 1.0                # NeMo actual grad_clip=1.0
use_amp: false                # NeMo FORCE_FP32=true → disable AMP for RL stage
num_workers: 4
seed: 42                      # NeMo seed=42

# --- RL config (aligned to NeMo actual run) ---
rl_weight: 0.02               # NeMo actual REWARD_WEIGHT=0.02
reward_mode: wwer             # NeMo actual reward_mode=wwer
reward_loss_type: reweight_ctc  # NeMo actual RL objective
reward_step_interval: 4       # NeMo REWARD_STEP_INTERVAL=4
max_encoder_len_for_reward: 1500  # skip reward for long utterances (GPU guard)
domain_term_weight: 3.0       # NeMo domain_term_weight=3.0
# 37-token clinical vocabulary (NeMo run config).
# Also stored in conf/domain_terms_clinical.txt for eval_extended.py.
domain_terms:
- patient
- hypertension
- malaria
- diabetes
- medication
- surgery
- diagnosis
- treatment
- hospital
- clinic
- prescription
- infection
- antibiotic
- dosage
- symptom
- fever
- blood
- pressure
- chronic
- acute
- cardiac
- respiratory
- pulmonary
- anemia
- tuberculosis
- hiv
- antiretroviral
- pregnancy
- prenatal
- neonatal
- cholesterol
- kidney
- liver
- cancer
- arthritis
- asthma
- epilepsy
gemini_api_key: ""            # set via --gemini_api_key or GEMINI_API_KEY env var
mock_llm: false               # use mock LLM (mwer+noise) instead of live Gemini

# --- LoRA (disabled by default; activated via run.sh --use_lora true) ---
use_adapter: false
adapter: lora
adapter_conf:
    rank: 8
    alpha: 16
    target_modules:
    - linear_q
    - linear_k
    - linear_v
    - linear_out
    - w_1
    - w_2
